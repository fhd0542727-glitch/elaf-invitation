<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إيلاف ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:linear-gradient(180deg,#000,#111);
color:white;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
padding:20px;
animation:fadeIn 2s ease;
}

h1{
font-size:60px;
color:#d4af37;
margin-bottom:15px;
text-shadow:0 0 20px rgba(212,175,55,.7);
}

.subtitle{
font-size:24px;
margin-bottom:25px;
color:#fff;
}

.place{
font-size:28px;
color:#d4af37;
margin-bottom:35px;
}

.countdown{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:35px;
}

.box{
background:rgba(255,255,255,.08);
padding:15px;
border-radius:15px;
min-width:80px;
backdrop-filter:blur(8px);
}

.number{
font-size:32px;
font-weight:bold;
color:#d4af37;
}

.label{
font-size:13px;
margin-top:5px;
}

button{
background:#d4af37;
border:none;
padding:15px 30px;
border-radius:50px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

.hearts{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 10s linear infinite;
}

.hidden{
display:none;
margin-top:25px;
font-size:22px;
line-height:1.8;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">

<h1>إيلاف ❤️</h1>

<div class="subtitle">
دعوة خاصة جدًا
</div>

<div class="place">
📍 المكان: شاليه
</div>

<div class="countdown">
<div class="box">
<div id="days" class="number">0</div>
<div class="label">يوم</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">ساعة</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">دقيقة</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">ثانية</div>
</div>
</div>

<button onclick="showInvite()">
افتح الدعوة ✨
</button>

<div class="hidden" id="invite">
🌹

إيلاف،

تم اختيار هذا اليوم خصيصًا لكِ.

بانتظارك في الشاليه لقضاء وقت جميل
ومميز لا يُنسى.

❤️
</div>

</div>

<script>
function showInvite(){
document.getElementById("invite").style.display="block";
}

const targetDate = new Date("2026-06-21T16:00:00");

function updateCountdown(){
const now = new Date();
const diff = targetDate - now;

if(diff <= 0){
document.querySelector(".countdown").innerHTML =
"<h2>وصل موعد اللقاء ❤️</h2>";
return;
}

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);
const seconds = Math.floor((diff/1000)%60);

document.getElementById("days").textContent = days;
document.getElementById("hours").textContent = hours;
document.getElementById("minutes").textContent = minutes;
document.getElementById("seconds").textContent = seconds;
}

setInterval(updateCountdown,1000);
updateCountdown();

for(let i=0;i<25;i++){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(6+Math.random()*8)+"s";
heart.style.fontSize=(15+Math.random()*25)+"px";
document.getElementById("hearts").appendChild(heart);
}
</script>

</body>
</html>
