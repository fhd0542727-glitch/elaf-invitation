<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ إيلاف ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #000, #111);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* حاوية القلوب المتساقطة في الخلفية */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-fall {
            position: absolute;
            color: rgba(255, 0, 0, 0.6);
            font-size: 24px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 500px;
            width: 100%;
            z-index: 2;
            transition: all 0.8s ease-in-out;
        }

        /* حركة الاختفاء السلس */
        .fade-out {
            opacity: 0;
            transform: scale(0.9) translateY(-30px);
            pointer-events: none;
            position: absolute;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 50px;
            color: #dda7a2;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(212,175,55,0.3);
        }

        .subtitle {
            font-size: 22px;
            margin-bottom: 25px;
            color: #fff;
        }

        .place {
            font-size: 24px;
            color: #dda7a2;
            margin-bottom: 25px;
        }
